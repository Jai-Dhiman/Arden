name = "arden-api-rust"
main = "worker/worker.js" # This will be generated by wasm-pack
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENV = "development"

[[d1_databases]]
binding = "DB"
database_name = "arden-db"
database_id = "3bbd1486-85f2-4b83-862b-f4522abd194e"

[[kv_namespaces]]
binding = "ARDEN_REFRESH_TOKEN_KV"
id = "0e4eb9cb47034089b9ce9dc30bf1e902"

[build]
command = "wasm-pack build --target bundler"
watch_dir = "src"

[wasm_modules]
MAIN = "target/wasm32-unknown-unknown/release/rust_server.wasm"

[observability.logs]
enabled = true
